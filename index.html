<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are u the best girl?❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Sacramento&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary-red: #ff4d6d;
            --soft-white: #fff5f6;
            --deep-red: #c9184a;
        }

        body {
            background-color: var(--soft-white);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        /* THE GLOW-UP (CSS) */
        .card {
            background: rgb(91, 5, 5);
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            border: 3px solid var(--primary-red);
            max-width: 450px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: var(--deep-red);
            font-family: 'Sacramento', cursive;
            font-size: 3.5rem;
            margin: 10px 0;
        }

        p {
            color: #555;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        .gif-box img {
            width: 100%;
            max-width: 250px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 60px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: var(--primary-red);
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: var(--deep-red);
        }

        #noBtn {
            background-color: #fff;
            color: var(--primary-red);
            border: 2px solid var(--primary-red);
            position: absolute; /* Needed for the teleporting chaos */
        }

        /* SUCCESS VIEW */
        .hidden { display: none; }
        
        #songLink {
            display: inline-block;
            margin-top: 20px;
            color: var(--deep-red);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px dotted var(--deep-red);
        }

        /* Floating Hearts background */
        .heart-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="heart-bg" id="heartBg"></div>

    <div class="card">
        <div id="questionSection">
            <div class="gif-box">
                <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExaTJvcmpzOHk5bzRlMHdjcjUybTN2YzNwYjNiOHRoY3gybTlsdGd0aiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ZdHoBNyzkJmUznpbEq/giphy.gif" alt="Asking GIF">
            </div>
            <h1>Maha...</h1>
            <p>Are u the best girl? ❤️</p>
            <div class="btn-group">
                <button id="yesBtn">YES!</button>
                <button id="noBtn">No</button>
            </div>
        </div>

        <div id="successSection" class="hidden">
            <div class="gif-box">
                <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExeWdxcGFldnhsdHQ0cnFwNHM4bnU2N2RqdGN4NjBxYjhnczNpYW5kZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/pqStRjJyVEZDapW6EM/giphy.gif" alt="Success GIF">
            </div>
            <h1>YAY! I Knew It! 🥰</h1>
            <p>u really are the amazing kind of girl 
sweet , funny ,and full of sunshine…
basically a whole happy playlist in one person 🎧🌸</p>
            <a href="https://youtu.be/JLd09jmEAYA?si=x7jYbGcWfVc3Omcp" id="songLink" target="_blank">🎵 Listen to this song 🎵</a>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const qSection = document.getElementById('questionSection');
        const sSection = document.getElementById('successSection');

        // THE CHAOS: Teleporting No Button
        const moveNoButton = () => {
            // Calculate random positions within the screen padding
            const padding = 100;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        };

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('click', moveNoButton); // Just in case they are fast!

        // THE CELEBRATION: Yes Click
        yesBtn.addEventListener('click', () => {
            qSection.classList.add('hidden');
            sSection.classList.remove('hidden');

            // 🎆 CONFETTI EXPLOSION 🎆
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
              const timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              const particleCount = 50 * (timeLeft / duration);
              // since particles fall down, start a bit higher than random
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        });

        // Background Hearts Spawn
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.opacity = Math.random();
            heart.style.transition = 'transform 5s linear, opacity 5s';
            document.getElementById('heartBg').appendChild(heart);

            setTimeout(() => {
                heart.style.transform = `translateY(-110vh) rotate(${Math.random() * 360}deg)`;
                heart.style.opacity = '0';
            }, 100);

            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
