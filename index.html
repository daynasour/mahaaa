<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Are u the best girl?❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root {
    --primary-red: #ff4d6d;
    --soft-white: #fff5f6;
    --deep-red: #c9184a;
}

body {
    background-color: var(--soft-white);
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    text-align: center;
}

.card {
    background: rgb(91, 5, 5);
    padding: 3rem;
    border-radius: 40px;
    box-shadow: 0 15px 35px rgba(255, 77, 109, 0.3);
    border: 3px solid var(--primary-red);
    max-width: 450px;
    width: 90%;
    position: relative;
    z-index: 10;
}

.question-text,
.success-title,
.success-text {
    color: white;
    font-weight: 600;
    font-size: 1.6rem;
    text-shadow: 0 0 8px rgba(255, 182, 193, 0.8);
}

.success-text {
    font-size: 1.3rem;
    line-height: 1.6;
}

.gif-box img {
    width: 100%;
    max-width: 250px;
    border-radius: 20px;
    margin-bottom: 20px;
}

.btn-group {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    min-height: 80px;
    position: relative;
}

button {
    padding: 15px 35px;
    font-size: 1.1rem;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

#yesBtn {
    background-color: var(--primary-red);
    color: white;
}

#yesBtn:hover {
    background-color: var(--deep-red);
}

#noBtn {
    background-color: #fff;
    color: var(--primary-red);
    border: 2px solid var(--primary-red);
    position: absolute;
    transition: all 0.2s ease;
}

.hidden { display: none; }

#songLink {
    display: inline-block;
    margin-top: 20px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    border-bottom: 2px dotted white;
}

.heart-bg {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
}
</style>
</head>
<body>

<div class="heart-bg" id="heartBg"></div>

<div class="card">
    <div id="questionSection">
        <div class="gif-box">
            <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExaTJvcmpzOHk5bzRlMHdjcjUybTN2YzNwYjNiOHRoY3gybTlsdGd0aiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ZdHoBNyzkJmUznpbEq/giphy.gif">
        </div>

        <p class="question-text">Are u the best girl? ❤️</p>

        <div class="btn-group" id="btnGroup">
            <button id="yesBtn">YES!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div id="successSection" class="hidden">
        <div class="gif-box">
            <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExeWdxcGFldnhsdHQ0cnFwNHM4bnU2N2RqdGN4NjBxYjhnczNpYW5kZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/pqStRjJyVEZDapW6EM/giphy.gif">
        </div>

        <h1 class="success-title">YAY! I Know It! 🥰</h1>

        <p class="success-text">
        u really are the amazing kind of girl sweet, funny, and full of sunshine…
        basically a whole happy playlist in one person 🎧🌸
        </p>

        <a href="https://youtu.be/JLd09jmEAYA?si=x7jYbGcWfVc3Omcp" id="songLink" target="_blank">
        🎵 Listen to this song 🎵
        </a>
    </div>
</div>

<script>
const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');
const qSection = document.getElementById('questionSection');
const sSection = document.getElementById('successSection');
const btnGroup = document.getElementById('btnGroup');

let noScale = 1;
let yesScale = 1;

/* 😈 No button shrinks + runs */
function moveNoButton() {

    noScale -= 0.1;
    if(noScale < 0.4) noScale = 0.4;

    yesScale += 0.1;

    noBtn.style.transform = `scale(${noScale})`;
    yesBtn.style.transform = `scale(${yesScale})`;

    const containerRect = btnGroup.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();

    const maxX = containerRect.width - btnRect.width;
    const maxY = 60;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

noBtn.addEventListener('mouseover', moveNoButton);
noBtn.addEventListener('click', moveNoButton);

yesBtn.addEventListener('click', () => {
    qSection.classList.add('hidden');
    sSection.classList.remove('hidden');

    const duration = 4 * 1000;
    const animationEnd = Date.now() + duration;
    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

    const interval = setInterval(function() {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);

        const particleCount = 50 * (timeLeft / duration);

        confetti(Object.assign({}, defaults, {
            particleCount,
            origin: { x: Math.random(), y: Math.random() - 0.2 }
        }));
    }, 250);
});

/* Floating hearts */
function createHeart() {
    const heart = document.createElement('div');
    heart.innerHTML = '❤️';
    heart.style.position = 'fixed';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.top = '100vh';
    heart.style.fontSize = Math.random() * 20 + 10 + 'px';
    heart.style.opacity = Math.random();
    heart.style.transition = 'transform 5s linear, opacity 5s';
    document.getElementById('heartBg').appendChild(heart);

    setTimeout(() => {
        heart.style.transform = `translateY(-110vh) rotate(${Math.random() * 360}deg)`;
        heart.style.opacity = '0';
    }, 100);

    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
